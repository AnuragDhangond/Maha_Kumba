<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />

  <link rel="icon" href="/favicon1.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#000000" />
  <meta name="description"
    content="Official Website for Kumbh Mela 2027 Nashik - Explore essential services and spiritual journey details." />
  <link rel="apple-touch-icon" href="/logo192.png" />
  <!--
      manifest.json provides metadata used when your web app is installed on a
      user's mobile device or desktop. See https://developers.google.com/web/fundamentals/web-app-manifest/
    -->
  <link rel="manifest" href="/manifest.json" />
  <!--
      Notice the use of %PUBLIC_URL% in the tags above.
      It will be replaced with the URL of the `public` folder during the build.
      Only files inside the `public` folder can be referenced from the HTML.

      Unlike "/favicon.ico" or "favicon.ico", "%PUBLIC_URL%/favicon.ico" will
      work correctly both with client-side routing and a non-root public URL.
      Learn how to configure a non-root public URL by running `npm run build`.
    -->
  <title>Kumbh Mela 2027 Nashik</title>
  <script>
    if (typeof global === 'undefined') {
      window.global = window;
    }
    // Global crash inspector for mobile testing
    window.onerror = function(message, source, lineno, colno, error) {
      const div = document.createElement('div');
      div.style.position = 'fixed';
      div.style.top = '0';
      div.style.left = '0';
      div.style.width = '100vw';
      div.style.height = '100vh';
      div.style.backgroundColor = '#fff0f0';
      div.style.color = '#b71c1c';
      div.style.padding = '20px';
      div.style.boxSizing = 'border-box';
      div.style.zIndex = '9999999';
      div.style.fontSize = '14px';
      div.style.overflow = 'auto';
      div.style.fontFamily = 'monospace';
      div.innerHTML = '<h2 style="margin-top:0;">Mobile Diagnostics: React Crashed</h2>' + 
                      '<p><b>Message:</b> ' + message + '</p>' +
                      '<p><b>File:</b> ' + source + '</p>' +
                      '<p><b>Line/Col:</b> ' + lineno + ':' + colno + '</p>' +
                      '<p><b>Stack trace:</b><br><pre style="white-space:pre-wrap; font-size:12px;">' + (error && error.stack ? error.stack : 'No stack available') + '</pre></p>';
      document.body.appendChild(div);
      return false;
    };
  </script>
</head>

<body>
  <noscript>You need to enable JavaScript to run this app.</noscript>
  <div id="root"></div>

  <!-- Google Translate Integration Removed to prevent conflicts with custom i18n -->
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
